name: CI

# Build + hermetic tests on every push and PR. The Swift suite injects fakes for
# every peer CLI (FakeSpawner, temp stub scripts), so it needs no API keys and no
# codex/claude/grok on the runner — it runs green from a clean checkout.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15  # ships Xcode 16 / Swift 6, required by swift-tools-version 6.0
    steps:
      - uses: actions/checkout@v4

      - name: Select latest-stable Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Release-ready gate (build + tests + MCP version probe)
        run: bash scripts/check-release-ready.sh
