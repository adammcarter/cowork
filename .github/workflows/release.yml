name: Release

# Push a tag `vX.Y.Z` → this builds the shipped artifact and publishes a GitHub
# Release. The tag cannot outrun the binary: the gate refuses unless
# Sources/cowork/Version.swift already says X.Y.Z (bump + commit lands first).
#
# Signing and notarization are GATED on repo secrets so the pipeline works today
# and upgrades the moment credentials are added — no secrets → a universal,
# ad-hoc-signed binary (install.sh clears the quarantine bit); Developer ID
# secrets → a hardened-runtime signed + notarized binary that runs on any Mac.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to (re)release, e.g. 0.0.1 — must equal Version.swift'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15  # ships Xcode 16 / Swift 6, required by swift-tools-version 6.0
    env:
      # `secrets` is allowed in env; these gate the optional sign/notarize steps.
      HAS_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' }}
      HAS_NOTARY: ${{ secrets.MACOS_NOTARY_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing cowork $VERSION"

      - name: Select latest-stable Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Release-ready gate (version match + build + tests + MCP probe)
        run: bash scripts/check-release-ready.sh --version "${{ steps.v.outputs.version }}"

      - name: Build universal binary (arm64 + x86_64)
        run: |
          swift build -c release --arch arm64 --arch x86_64
          BIN="$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)/cowork"
          echo "BIN=$BIN" >> "$GITHUB_ENV"
          file "$BIN"

      - name: Sign
        env:
          CERT: ${{ secrets.MACOS_CERTIFICATE }}
          CERT_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          if [ "$HAS_SIGNING" = "true" ]; then
            KEYCHAIN="$RUNNER_TEMP/cowork-signing.keychain-db"
            KPWD="$(uuidgen)"
            security create-keychain -p "$KPWD" "$KEYCHAIN"
            security set-keychain-settings -lut 3600 "$KEYCHAIN"
            security unlock-keychain -p "$KPWD" "$KEYCHAIN"
            echo "$CERT" | base64 --decode > "$RUNNER_TEMP/cert.p12"
            security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PWD" \
              -T /usr/bin/codesign
            security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPWD" "$KEYCHAIN"
            codesign --force --timestamp --options runtime --sign "$IDENTITY" "$BIN"
            echo "Signed with Developer ID: $IDENTITY"
          else
            # Ad-hoc: a valid signature, but not a trust anchor. install.sh strips
            # the quarantine bit so a locally-installed binary runs; cross-machine
            # distribution needs the Developer ID secrets above.
            codesign --force --sign - "$BIN"
            echo "::notice::No signing secrets set — binary is ad-hoc signed (see docs/install.md)."
          fi
          codesign --verify --verbose "$BIN"

      - name: Stage release prefix
        run: |
          set -euo pipefail
          VERSION="${{ steps.v.outputs.version }}"
          PKG="cowork-$VERSION-macos-universal"
          STAGE="$RUNNER_TEMP/$PKG"
          mkdir -p "$STAGE/bin"
          cp "$BIN" "$STAGE/bin/cowork"
          cp -R roles "$STAGE/roles"
          cp -R skills "$STAGE/skills"
          [ -d commands ] && cp -R commands "$STAGE/commands" || true
          [ -d docs ] && cp -R docs "$STAGE/docs" || true
          # Cowork ships no built-in agents, so the example config is the only place a
          # user can see a working wire. Leaving it out of the tarball would ship a
          # binary that can dispatch to nothing until they find the repo.
          [ -d examples ] && cp -R examples "$STAGE/examples" || true
          cp scripts/install.sh "$STAGE/install.sh"
          cp LICENSE "$STAGE/LICENSE" 2>/dev/null || true
          chmod +x "$STAGE/install.sh" "$STAGE/bin/cowork"
          ( cd "$RUNNER_TEMP" && tar -czf "$PKG.tar.gz" "$PKG" && shasum -a 256 "$PKG.tar.gz" > "$PKG.tar.gz.sha256" )
          echo "PKG=$PKG" >> "$GITHUB_ENV"
          echo "ASSET=$RUNNER_TEMP/$PKG.tar.gz" >> "$GITHUB_ENV"

      - name: Notarize
        if: env.HAS_NOTARY == 'true'
        env:
          NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
        run: |
          set -euo pipefail
          echo "$NOTARY_KEY" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          # A bare CLI binary can't be stapled; notarytool registers the ticket so
          # Gatekeeper clears it online on first run. Submit the shipped archive.
          xcrun notarytool submit "$ASSET" \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER" \
            --wait

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.v.outputs.version }}"
          gh release create "v$VERSION" \
            "$ASSET" "$ASSET.sha256" \
            --title "cowork v$VERSION" \
            --generate-notes \
            --notes "Prebuilt universal (arm64+x86_64) macOS binary. Install:

          \`\`\`sh
          tar -xzf $PKG.tar.gz && cd $PKG && ./install.sh
          \`\`\`

          Registers cowork as an MCP server on every host CLI it finds
          (Claude Code, Codex, Copilot, OpenCode). See docs/install.md." \
            || gh release upload "v$VERSION" "$ASSET" "$ASSET.sha256" --clobber
