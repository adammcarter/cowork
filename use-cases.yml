schema_version: 1
workspace_id: cowork
component_id: cowork
data_root: .
use_cases_dir: use-cases
evidence_dir: evidence
demo_capsules_dir: demo-capsules
showcase_runs_dir: showcase-runs
default_workflow_mode: continuous

# Every row's verifier is a PERFORMED JOURNEY against the built binary, driven
# over real stdio MCP — the same surface a host CLI touches. Nothing here runs a
# `swift test`, and that is deliberate: green unit tests do not prove the contract
# works end-to-end, so each row performs the real behaviour against the real
# binary rather than asserting it in isolation.
#
# `{slug}` is the row id. A row with no journey exits non-zero, so a row can
# never pass by existing.
verifiers:
  default: journey
  journey:
    kind: script
    evidence_kind: live_demo
    command: ["bash", "use-cases/verifiers/run.sh", "{slug}"]
  # Host-conformance rows: the variant names a real agent CLI (claude | codex |
  # copilot | opencode) and the journey drives that harness headlessly with
  # cowork registered as a scoped MCP server. One family row, one verdict per
  # host — the family is green only when every declared host passes.
  host-journey:
    kind: script
    evidence_kind: live_demo
    command: ["bash", "use-cases/verifiers/run-host.sh", "{slug}", "{variant}"]
