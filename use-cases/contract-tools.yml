        steps:
          - Dispatch a task with a verbatim expected answer.
          - Wait for the dispatch to reach a terminal state.
          - Read `status` and `output`.
    observable_outcomes:
      - status reports `succeeded`.
      - output is the worker's own declared result, not a summary cowork invented.
    host_applicability:
