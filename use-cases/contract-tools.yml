  - id: contract.tools.follow_up_refused_when_no_continuation
    title: a backend that cannot follow up says so, rather than starting fresh and pretending
    lifecycle: active
    value_tier: core
    journey_role: edge
    usage_frequency: occasional
    tags: [adr-001, truthfulness]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/FollowUp.swift
    actor: An orchestrating agent
    intent: Learn that context cannot be carried, instead of silently losing it.
    preconditions:
      - An endpoint dispatch has finished. Cowork owns the message list, so there is no continuation handle.
    trigger: The caller calls `follow_up` on it.
    scenarios:
      - id: contract.tools.follow_up_refused_when_no_continuation.main
        kind: steps
        steps:
          - Dispatch to an endpoint backend and let it finish.
          - Call `follow_up` on that dispatch.
    observable_outcomes:
      - The call is refused with a diagnostic naming the reason.
      - Cowork does not start a fresh dispatch and call it a follow-up — that would forget everything the worker knew while reporting continuity.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
