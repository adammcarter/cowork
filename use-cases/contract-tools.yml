  - id: contract.tools.follow_up_carries_context
    title: follow_up starts a new dispatch carrying a finished dispatch's context
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-001]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/FollowUp.swift
    actor: An orchestrating agent
    intent: Continue a finished dispatch without losing what it learned.
    preconditions:
      - The claude CLI backend is configured and logged in.
    trigger: The caller calls `follow_up` on a finished dispatch.
    scenarios:
      - id: contract.tools.follow_up_carries_context.main
        kind: steps
