schema_version: 1
# ADR 001: the tool list is cowork's public contract — ten tools and one
# attributed event stream. Nothing else is promised. The contract is not kept
# until all ten exist and each is exercised against a real backend.
feature:
  id: contract
  name: The public contract — ten tools and one attributed event stream
  summary: >-
    Callers depend on ten tools, not on a protocol, a daemon, or a client
    library. Each row here is exercised over real stdio MCP against the built
    binary, because a tool that is wired but never driven is exactly the state
    ADR 001 was written to prevent.
metadata:
  owner: cowork
  lifecycle: active

use_cases:
  - id: contract.tools.ten_tools_exposed
    title: All ten contract tools are exposed, and nothing else is promised
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-001, contract]
    source_refs:
      - kind: file
        path: Sources/cowork/main.swift
    actor: A host CLI
    intent: Discover what cowork promises, and depend on exactly that.
    preconditions:
      - The cowork binary is built.
    trigger: The host performs an MCP `tools/list`.
    scenarios:
      - id: contract.tools.ten_tools_exposed.main
        kind: steps
        steps:
          - Handshake with the cowork MCP server over stdio.
          - Call `tools/list`.
          - Compare the names against ADR 001's table.
    observable_outcomes:
      - Exactly dispatch, send, finish, follow_up, status, output, wait, cancel, list and capabilities are offered.
      - A tool absent from the contract is absent from the surface.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: contract.tools.dispatch_returns_id_while_work_runs_elsewhere
    title: dispatch returns an opaque id immediately; the work runs in its own process
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-001, adr-003]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/Dispatcher.swift
    actor: An orchestrating agent
    intent: Fire off work and keep going, rather than blocking on a result.
    preconditions:
      - A reachable endpoint provider is configured.
    trigger: The caller calls `dispatch` with a long-running task.
    scenarios:
      - id: contract.tools.dispatch_returns_id_while_work_runs_elsewhere.main
        kind: steps
        steps:
          - Dispatch a task that takes far longer than the call itself.
          - Observe that an id is returned in under a second.
          - Observe that the dispatch is still queued or running afterwards.
    observable_outcomes:
      - An opaque `j_` id is returned promptly; ids are minted by cowork and callers never supply them.
      - The work is genuinely elsewhere — the dispatch is still in flight when the call returns.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: contract.tools.status_and_output_report_declared_result
