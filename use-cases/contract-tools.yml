  - id: contract.tools.wait_is_hard_capped_and_returns_still_running
    title: wait is hard-capped and reports "still running" rather than blocking forever
    lifecycle: active
    value_tier: core
    journey_role: edge
    usage_frequency: common
    tags: [adr-001]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/Dispatcher.swift
    actor: An orchestrating agent
    intent: Bound how long it will wait, without losing the dispatch.
    preconditions:
      - A dispatch is running and will not finish within the wait budget.
    trigger: The caller calls `wait` with a short timeout.
    scenarios:
      - id: contract.tools.wait_is_hard_capped_and_returns_still_running.main
        kind: steps
        steps:
          - Dispatch a long task.
          - Call `wait` with a 3 second timeout.
          - Observe the call return at the cap with the state.
    observable_outcomes:
      - wait returns at its cap, never blocking indefinitely.
      - The state `running` is returned as a real answer — a caller can tell in-flight work from a result.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: contract.tools.wait_streams_progress_when_asked
    title: wait streams live progress to a caller that asks, without changing the result
    lifecycle: active
    value_tier: core
    journey_role: alternate
    usage_frequency: common
    tags: [adr-001, mcp, progress]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/WaitProgress.swift
    actor: An orchestrating agent whose host renders MCP progress
    intent: See that in-flight work is alive and what it is doing, without giving up the durable wait/status/output it already relies on.
    preconditions:
      - A dispatch is running against a backend that takes a few seconds.
      - The caller sends a progressToken with the wait request.
    trigger: The caller calls `wait` with a progressToken in the request _meta.
    scenarios:
      - id: contract.tools.wait_streams_progress_when_asked.main
        kind: steps
        steps:
          - Dispatch a task that runs for several seconds.
          - Call `wait` with a progressToken and collect notifications/progress until it returns.
          - Compare the heartbeats and the terminal result.
    observable_outcomes:
      - notifications/progress arrive during the wait, each carrying the caller's token and the live lifecycle state.
      - Progress increases monotonically and at least one heartbeat is seen while the worker is still running.
      - The terminal result is exactly what a caller without a progressToken would get — progress is visibility over the durable store, never a replacement for it.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

