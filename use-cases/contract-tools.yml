        path: Sources/CoworkCore/Interaction.swift
      - kind: file
        path: Sources/CoworkCore/Mailbox.swift
    actor: An orchestrating agent
    intent: Give a running worker a pivot or one extra detail without losing its context.
    preconditions:
      - An interactive dispatch is alive and awaiting input.
    trigger: The caller calls `send`.
    scenarios:
      - id: contract.tools.send_messages_a_live_worker.main
        kind: steps
        steps:
          - Dispatch interactively and let the worker declare its first turn.
          - Send a second message naming a different verbatim answer.
          - Read the output.
    observable_outcomes:
      - The message reaches the live worker; `send` closes the gap where a pivot otherwise forces a stop-and-restart that discards the worker's context.
      - The worker answers the second message, producing its own declared result for that turn.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: contract.tools.finish_ends_an_interactive_dispatch
    title: finish ends an interactive dispatch and releases its warm worker
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-001, interactive, unverified]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/Interaction.swift
    actor: An orchestrating agent
    intent: Release a warm worker, and thereby stop paying for it.
    preconditions:
      - An interactive dispatch is alive in `awaiting_input`.
    trigger: The caller calls `finish`.
    scenarios:
      - id: contract.tools.finish_ends_an_interactive_dispatch.main
        kind: steps
        steps:
          - Dispatch interactively and let the worker park in `awaiting_input`.
          - Call `finish`.
          - Inspect the process table.
    observable_outcomes:
      - The dispatch reaches a terminal state.
      - The warm worker and its supervisor are released — an interactive dispatch holds a live process by design, and `finish` is what bounds the cost.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: contract.events.every_event_carries_parent_and_root
    title: every event is attributed with parent and root, and stays under PIPE_BUF
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-001, adr-003, events]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/Events.swift
    actor: A monitor, a panel, or a shell one-liner
    intent: Watch dispatches and filter to one lineage in a single pass over one line.
    preconditions:
      - A dispatch has run.
    trigger: The consumer tails the event stream.
    scenarios:
      - id: contract.events.every_event_carries_parent_and_root.main
        kind: steps
        steps:
          - Dispatch a task and let it finish.
          - Read every event for that dispatch off the append-only stream.
          - Check the fields and the line size.
    observable_outcomes:
      - Every event carries v, ts, id, parent, root, backend and event.
      - "`parent` answers \"who fired this one\" and `root` answers \"whose work is this\", so a consumer never accumulates the tree in memory."
      - Every line stays under PIPE_BUF (4096 bytes), which is what makes concurrent appends atomic with no lock.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: contract.workspace.unconfined_is_recorded_as_unconfined
    title: an unconfined dispatch is recorded as unconfined, never silently defaulted
    lifecycle: active
    value_tier: core
    journey_role: edge
    usage_frequency: common
    tags: [adr-001, workspace]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/Dispatcher.swift
    actor: A user auditing what authority a worker was given
    intent: Tell, after the fact, whether a worker was confined to a directory.
    preconditions:
      - None.
    trigger: A dispatch is fired with, and without, a workspace grant.
    scenarios:
      - id: contract.workspace.unconfined_is_recorded_as_unconfined.main
        kind: steps
        steps:
          - Dispatch with no workspace, and inspect its queued event.
          - Dispatch with a workspace, and inspect its queued event.
    observable_outcomes:
      - An absent workspace means unconfined — a legitimate explicit choice, since a model asked to summarise text touches no repository.
      - "It is never a silent default: the unconfined dispatch is recorded as unconfined in the event stream."
      - A confined dispatch records its grant instead.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none
