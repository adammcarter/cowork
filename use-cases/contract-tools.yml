          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: contract.tools.interactive_parks_in_awaiting_input
    title: an interactive dispatch declares its turn and parks in awaiting_input
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-001, interactive, unverified]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/InteractiveSession.swift
      - kind: file
        path: Sources/cowork/SuperviseMode.swift
    actor: An orchestrating agent
    intent: Keep a worker warm so it can be given a pivot or one extra detail.
    preconditions:
      - The claude CLI backend is configured, and `capabilities` reports supports_message true for it.
    trigger: The caller dispatches with the interactive flag set.
    scenarios:
      - id: contract.tools.interactive_parks_in_awaiting_input.main
        kind: steps
        steps:
          - "Dispatch with `interactive: true`."
          - Observe the record and the mailbox.
          - Watch the lifecycle state after the worker declares its first turn.
    observable_outcomes:
      - "ADR 001 rule 2 — a turn ending is not a dispatch ending — holds: the worker declares its turn's outcome and stays alive."
      - The dispatch reaches `awaiting_input`, which is a real state and not a variant of success.
      - The dispatch ends only on `finish`, an idle timeout, or worker exit.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: contract.tools.send_messages_a_live_worker
    title: send delivers a message to a live worker and gets a second declared turn
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-001, interactive, unverified]
    source_refs:
