  - id: contract.tools.list_scopes_to_lineage_and_refuses_unknown_scope
    title: list is scoped to the caller's own lineage, and an unhonourable scope is refused
    lifecycle: active
    value_tier: core
    journey_role: edge
    usage_frequency: common
    tags: [adr-001]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/List.swift
    actor: An orchestrating agent
    intent: See its own work, and only its own, unless it asks otherwise.
    preconditions:
      - At least one dispatch exists.
    trigger: The caller calls `list`, `list(all)`, and `list` with a nonsense scope.
    scenarios:
      - id: contract.tools.list_scopes_to_lineage_and_refuses_unknown_scope.main
        kind: steps
        steps:
          - Dispatch a task and let it finish.
          - Call `list` with no scope, then with `all`, then with an unknown scope.
    observable_outcomes:
      - The default scope shows the caller's own lineage with parent and root attribution.
      - "`all` shows everything on the machine."
      - An unknown scope is refused rather than silently becoming a different scope — a caller is never shown someone else's work, nor silently denied their own.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
