  - id: endpoint.tool_loop.model_uses_workspace_tools
    title: The endpoint loop is a faithful client of the provider's own tool-call contract
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-001, endpoint, tools]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/EndpointBackend.swift
      - kind: file
        path: Sources/CoworkCore/Tools.swift
    actor: An orchestrating agent
    intent: Have a model actually do work in a directory, not merely talk about it.
    preconditions:
      - A reachable endpoint provider serving a tool-calling model.
      - A workspace containing an input file.
    trigger: The caller dispatches a task that can only be completed with tools.
    scenarios:
      - id: endpoint.tool_loop.model_uses_workspace_tools.main
        kind: steps
        steps:
          - Grant a workspace holding an input file.
          - Dispatch a task requiring the model to read it and write a result file.
          - Wait for a terminal state and inspect the workspace.
    observable_outcomes:
      - The model's tool calls are executed and the result file really exists on disk.
      - A tool-call turn is a continuation, not a terminal outcome — only the loop's own conclusion is terminal.
      - Cowork reports what happened and does not grade the answer. A wrong-but-declared-complete answer is still reported as succeeded, because grading belongs to the caller.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: endpoint.provider_is_configuration_not_code
    title: No endpoint is named in Swift — a provider is one configuration entry
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: rare
    tags: [adr-005, config]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/Config.swift
    actor: A user adding a provider
    intent: Add a provider without a code change and a release.
    preconditions:
      - Several providers are configured.
    trigger: A reader greps the source for any endpoint.
    scenarios:
      - id: endpoint.provider_is_configuration_not_code.main
        kind: steps
        steps:
          - Search every Swift source file for a URL, host, or port.
          - Confirm the configured providers exist only as configuration.
    observable_outcomes:
      - No provider, URL, path, port or credential is named anywhere in Sources.
      - Adding a provider is a config edit, not a code change and a release.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: endpoint.credential.absent_names_the_variable_never_a_value
    title: A missing credential fails before the request, naming the variable and never a value
    lifecycle: active
    value_tier: core
    journey_role: edge
    usage_frequency: occasional
    tags: [adr-001, adr-005, security]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/Credential.swift
    actor: A user who has not set their key
    intent: Be told exactly what is missing, without the tool ever echoing a secret.
    preconditions:
      - A provider with a credential reference is configured, and the credential is not available.
    trigger: The caller dispatches to that provider.
    scenarios:
      - id: endpoint.credential.absent_names_the_variable_never_a_value.main
        kind: steps
        steps:
          - Remove the credential from the dispatch's reach.
          - Dispatch and read the diagnostics.
          - Audit the event stream and the record for the real key's value.
    observable_outcomes:
      - The dispatch fails before the request is sent, with a diagnostic naming the expected variable.
      - The credential's value appears in no event, no record, and no diagnostic.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: endpoint.credential.env_reference_resolves_from_the_environment
    title: A credential reference of the form env:NAME resolves from the environment
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-005, security, unverified]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/Credential.swift
      - kind: file
        path: Sources/CoworkCore/Supervisor.swift
    actor: A user who exports their key in their shell
    intent: Configure a credential the way the config file says it is configured.
    preconditions:
      - A provider is configured with a credential reference naming an environment variable.
      - That variable is exported in the environment cowork runs in.
    trigger: The caller dispatches to that provider.
    scenarios:
      - id: endpoint.credential.env_reference_resolves_from_the_environment.main
        kind: steps
        steps:
          - Export the named variable into cowork's own environment.
          - Place no dotenv file anywhere near the working directory.
          - Dispatch and wait for a terminal state.
    observable_outcomes:
      - The credential is resolved from the environment and the dispatch succeeds.
      - A reference of the form env:NAME means the environment variable NAME — the config file's own documented meaning.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none
