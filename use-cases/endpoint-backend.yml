        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: endpoint.nvidia.hosted_https_key_dispatch_succeeds
    title: A second hosted provider is added by configuration alone
    lifecycle: active
    value_tier: supporting
    journey_role: golden
    usage_frequency: occasional
    tags: [adr-005, endpoint, nvidia, unverified]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/EndpointBackend.swift
    actor: A user adding a provider
    intent: Reach a hosted 70B behind a bearer token without cowork changing.
    preconditions:
      - The NVIDIA provider is declared in the user's global config with a credential reference.
    trigger: The caller dispatches to an NVIDIA backend id.
    scenarios:
