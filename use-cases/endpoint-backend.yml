    value_tier: supporting
    journey_role: golden
    usage_frequency: occasional
    tags: [adr-005, endpoint, ollama, unverified]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/EndpointBackend.swift
    actor: An orchestrating agent
    intent: Dispatch to a model on another machine on the LAN with no credential at all.
    preconditions:
      - The Ollama host on the LAN is reachable.
    trigger: The caller dispatches to an Ollama backend id.
    scenarios:
      - id: endpoint.ollama.lan_http_noauth_dispatch_succeeds.main
