schema_version: 1
# The ENDPOINT family: cowork owns the agent loop and the model runs elsewhere.
# ADR 001 and ADR 005. The claim under test is that provider identity, endpoint
# location, and credential mechanism are independent concerns served by one code
# path with zero provider-specific branches.
feature:
  id: endpoint
  name: Endpoint backends — cowork owns the loop
  summary: >-
    Four providers, three URL layouts, two transports and both credential
    mechanisms, through one code path. A provider is one configuration entry;
    no endpoint is named in Swift. Each row is a real dispatch to a real
    endpoint, because reachability is a live fact and a stored one is a lie.
metadata:
  owner: cowork
  lifecycle: active

use_cases:
  - id: endpoint.omlx.local_http_key_dispatch_succeeds
    title: A locally hosted model behind an API key is dispatchable
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-005, endpoint, omlx]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/EndpointBackend.swift
    actor: An orchestrating agent
    intent: Dispatch work to a model on the machine next door without it leaving the network.
    preconditions:
      - The oMLX host is reachable and serving the model.
      - The provider is declared in the user's global config with a credential reference.
    trigger: The caller dispatches to an oMLX backend id.
    scenarios:
      - id: endpoint.omlx.local_http_key_dispatch_succeeds.main
        kind: steps
        steps:
          - Dispatch a task with a verbatim expected answer.
          - Wait for a terminal state and read the output.
    observable_outcomes:
      - The dispatch succeeds and the model's declared answer is returned.
      - Local and authenticated is an ordinary combination — authentication is a property of an endpoint's configuration, not of where it runs.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: endpoint.anthropic.local_messages_dispatch_succeeds
    title: A model behind the Anthropic Messages API is dispatchable
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-005, adr-006, endpoint, anthropic, dialect]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/AnthropicDialect.swift
    actor: An orchestrating agent
    intent: Dispatch to an endpoint that speaks the Anthropic Messages API, not the OpenAI shape — proving the dialect, its stop_reason vocabulary, and its x-api-key auth are provider-shaped, not assumed.
    preconditions:
      - An endpoint serving the Anthropic /v1/messages API is reachable (oMLX serves it for the local model).
      - A provider with kind = "anthropic" is declared in the user's global config.
    trigger: The caller dispatches to an anthropic-dialect backend id.
    scenarios:
      - id: endpoint.anthropic.local_messages_dispatch_succeeds.main
        kind: steps
        steps:
          - Dispatch a task with a verbatim expected answer to the anthropic-kind backend.
          - Wait for a terminal state and read the output.
    observable_outcomes:
      - The dispatch succeeds and the model's declared answer is returned.
      - The Anthropic stop_reason (end_turn) is normalized onto the verdict vocabulary, so a clean finish reads as succeeded — not as an unknown reason wrongly failed.
      - A second endpoint dialect proves API shape and auth (x-api-key vs bearer) are the dialect's business, not a single assumption baked into the transport.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: endpoint.qwen.hosted_https_key_dispatch_succeeds
    title: A hosted provider over HTTPS on a non-standard URL layout is dispatchable
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [adr-005, endpoint, qwen]
    source_refs:
      - kind: file
        path: Sources/CoworkCore/EndpointBackend.swift
    actor: An orchestrating agent
    intent: Dispatch to a hosted frontier model through the same path as a local one.
    preconditions:
      - The hosted Qwen endpoint is reachable and the credential is present.
    trigger: The caller dispatches to a qwen backend id.
    scenarios:
      - id: endpoint.qwen.hosted_https_key_dispatch_succeeds.main
        kind: steps
        steps:
          - Dispatch a task with a verbatim expected answer.
          - Wait for a terminal state and read the output.
    observable_outcomes:
      - The dispatch succeeds through the same loop and the same tools as a local model.
      - The URL layout is configuration — Qwen serves a non-/v1 compatible-mode path, and hardcoding /v1 would silently exclude it while looking as though the provider were non-compliant.
      - Adding a hosted provider over HTTPS with an API key required no new code.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: live_demo
          required_verifiers: [journey]
          minimum_count: 1
    approval_policy:
      mode: none

